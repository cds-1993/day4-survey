<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XXXXX调查</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #1d1d1f;
      background: #f5f5f7;
    }

    .page {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 72px 24px;
    }

    header {
      margin-bottom: 28px;
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 6vw, 54px);
      line-height: 1.08;
      font-weight: 700;
      letter-spacing: 0;
    }

    .intro {
      margin: 0 auto;
      max-width: 560px;
      color: #6e6e73;
      font-size: 17px;
      line-height: 1.7;
    }

    .card {
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
      padding: 34px;
    }

    .form-grid {
      display: grid;
      gap: 24px;
    }

    .field {
      display: grid;
      gap: 10px;
    }

    label,
    .field-title {
      font-size: 15px;
      font-weight: 600;
      color: #1d1d1f;
    }

    input[type="text"],
    select {
      width: 100%;
      height: 50px;
      border: 1px solid #d2d2d7;
      border-radius: 12px;
      background: #fbfbfd;
      color: #1d1d1f;
      font: inherit;
      font-size: 16px;
      outline: none;
      padding: 0 15px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    input[type="text"]:focus,
    select:focus {
      background: #ffffff;
      border-color: #0071e3;
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.14);
    }

    .radio-group {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .radio-option {
      position: relative;
      min-height: 48px;
    }

    .radio-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .radio-option span {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      border: 1px solid #d2d2d7;
      border-radius: 12px;
      background: #fbfbfd;
      color: #424245;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    }

    .radio-option input:checked + span {
      border-color: #ffd60a;
      background: #fff8d6;
      color: #1d1d1f;
      box-shadow: 0 0 0 4px rgba(255, 214, 10, 0.16);
    }

    .submit-button {
      width: 100%;
      height: 54px;
      margin-top: 8px;
      border: 0;
      border-radius: 14px;
      background: #ffd60a;
      color: #1d1d1f;
      font: inherit;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(255, 214, 10, 0.32);
      transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    .submit-button:hover {
      background: #ffcc02;
      box-shadow: 0 14px 28px rgba(255, 204, 2, 0.38);
      transform: translateY(-1px);
    }

    .submit-button:active {
      transform: translateY(0);
    }

    .result-message {
      display: none;
      margin: 0;
      border-radius: 12px;
      padding: 14px 16px;
      background: #f5f5f7;
      color: #1d1d1f;
      font-size: 15px;
      line-height: 1.6;
    }

    .result-message.is-visible {
      display: block;
    }

    .result-message.is-error {
      background: #fff2f2;
      color: #b00020;
    }

    @media (max-width: 640px) {
      .page {
        padding: 44px 16px;
      }

      .card {
        border-radius: 16px;
        padding: 24px;
      }

      .radio-group {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <h1>XXXXX调查</h1>
      <p class="intro">请填写以下简短信息，帮助我们更好地了解您的使用习惯与偏好。</p>
    </header>

    <section class="card" aria-label="调查表单">
      <form class="form-grid" action="/submit" method="post">
        <div class="field">
          <label for="name">姓名</label>
          <input type="text" id="name" name="name" placeholder="请输入您的姓名" autocomplete="name" required>
        </div>

        <div class="field">
          <div class="field-title">性别</div>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="gender" value="male" required>
              <span>男</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="gender" value="female">
              <span>女</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="gender" value="other">
              <span>其他</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="gender" value="prefer-not-to-say">
              <span>不便透露</span>
            </label>
          </div>
        </div>

        <div class="field">
          <label for="country">国家</label>
          <select id="country" name="country" required>
            <option value="">请选择国家</option>
            <option value="china">中国</option>
            <option value="usa">美国</option>
            <option value="uk">英国</option>
            <option value="canada">加拿大</option>
            <option value="australia">澳大利亚</option>
            <option value="japan">日本</option>
            <option value="korea">韩国</option>
            <option value="germany">德国</option>
            <option value="france">法国</option>
            <option value="singapore">新加坡</option>
          </select>
        </div>

        <div class="field">
          <div class="field-title">频率</div>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="frequency" value="daily" required>
              <span>每天</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="frequency" value="weekly">
              <span>每周</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="frequency" value="monthly">
              <span>每月</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="frequency" value="rarely">
              <span>很少</span>
            </label>
          </div>
        </div>

        <button class="submit-button" type="submit">立即提交</button>
        <p class="result-message" id="resultMessage" aria-live="polite"></p>
      </form>
    </section>
  </main>
  <script>
    const form = document.querySelector(".form-grid");
    const resultMessage = document.querySelector("#resultMessage");
    const apiBaseUrl = window.location.protocol === "file:" ? "http://127.0.0.1:8000" : "";

    function showResult(message, isError = false) {
      resultMessage.textContent = message;
      resultMessage.classList.toggle("is-error", isError);
      resultMessage.classList.add("is-visible");
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const formData = new FormData(form);
      const name = String(formData.get("name") || "").trim();
      const fillTime = new Date().toLocaleString("zh-CN", { hour12: false });
      const payload = {
        name,
        gender: String(formData.get("gender") || ""),
        country: String(formData.get("country") || ""),
        frequency: String(formData.get("frequency") || ""),
        fill_time: fillTime,
      };

      try {
        const validateResponse = await fetch(`${apiBaseUrl}/api/validate-name`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ name }),
        });

        if (validateResponse.status === 403) {
          showResult("不在调查范围内", true);
          return;
        }

        if (!validateResponse.ok) {
          throw new Error(`validate HTTP ${validateResponse.status}`);
        }

        const countResponse = await fetch(`${apiBaseUrl}/api/name-count`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });

        if (countResponse.status === 403) {
          showResult("不在调查范围内", true);
          return;
        }

        if (!countResponse.ok) {
          throw new Error(`count HTTP ${countResponse.status}`);
        }

        const result = await countResponse.json();
        const resultName = result.data?.name ?? name;
        const nameCharCount = result.data?.name_char_count ?? resultName.length;
        const resultFillTime = result.data?.fill_time ?? fillTime;
        showResult(`提交成功，姓名“${resultName}”共有 ${nameCharCount} 个字符。填写时间：${resultFillTime}`);
      } catch (error) {
          showResult("提交失败，请稍后重试", true);
        }
      });
  </script>
</body>
</html>
